name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST || '18.188.234.72' }}
  EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
  EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || vars.EC2_APP_DIR || '/opt/rag-console' }}
  EC2_PORT: ${{ secrets.EC2_PORT || vars.EC2_PORT || '22' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://rag.atharvaai.com/api' }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA}"
          echo "api_image=ghcr.io/${owner}/rag-console-api:${tag}" >> "${GITHUB_OUTPUT}"
          echo "web_image=ghcr.io/${owner}/rag-console-web:${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: ${{ steps.images.outputs.api_image }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Validate public API URL
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_API_URL}" ]; then
            echo "Set repository variable NEXT_PUBLIC_API_URL, for example https://rag.atharvaai.com/api"
            exit 1
          fi

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.images.outputs.web_image }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Create app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          script: |
            set -eu
            sudo mkdir -p "${{ env.EC2_APP_DIR }}"
            sudo chown "${USER}:${USER}" "${{ env.EC2_APP_DIR }}"

      - name: Copy Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          source: deploy/ec2/docker-compose.ec2.yml,deploy/ec2/nginx/rag-console-http.conf,deploy/ec2/nginx/rag-console-https.conf
          target: ${{ env.EC2_APP_DIR }}
          strip_components: 2

      - name: Configure Nginx reverse proxy
        uses: appleboy/ssh-action@v1.0.3
        env:
          TLS_EMAIL: ${{ secrets.TLS_EMAIL || vars.TLS_EMAIL }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          envs: TLS_EMAIL
          script: |
            set -eu

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx certbot python3-certbot-nginx curl
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y nginx certbot python3-certbot-nginx curl
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y nginx certbot python3-certbot-nginx curl
            else
              echo "Unable to find a supported package manager for Nginx installation."
              exit 1
            fi

            sudo mkdir -p /var/www/letsencrypt /etc/nginx/sites-available /etc/nginx/sites-enabled

            if command -v docker >/dev/null 2>&1; then
              old_caddy_ids="$(docker ps --format '{{.ID}} {{.Names}}' | awk '$2 ~ /caddy/ {print $1}')"
              if [ -n "${old_caddy_ids}" ]; then
                docker stop ${old_caddy_ids}
              fi
            fi

            http_config="$(find "${{ env.EC2_APP_DIR }}" -type f -name rag-console-http.conf | head -n 1)"
            https_config="$(find "${{ env.EC2_APP_DIR }}" -type f -name rag-console-https.conf | head -n 1)"

            if [ -z "${http_config}" ] || [ -z "${https_config}" ]; then
              echo "Nginx config files were not copied to ${{ env.EC2_APP_DIR }}."
              find "${{ env.EC2_APP_DIR }}" -maxdepth 4 -type f | sort
              exit 1
            fi

            sudo cp "${http_config}" /etc/nginx/sites-available/rag-console
            sudo ln -sf /etc/nginx/sites-available/rag-console /etc/nginx/sites-enabled/rag-console
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl enable --now nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx

            if [ ! -f /etc/letsencrypt/live/rag.atharvaai.com/fullchain.pem ]; then
              if [ -n "${TLS_EMAIL:-}" ]; then
                sudo certbot certonly --webroot --webroot-path /var/www/letsencrypt --domain rag.atharvaai.com --non-interactive --agree-tos --email "${TLS_EMAIL}" --keep-until-expiring
              else
                sudo certbot certonly --webroot --webroot-path /var/www/letsencrypt --domain rag.atharvaai.com --non-interactive --agree-tos --register-unsafely-without-email --keep-until-expiring
              fi
            fi

            sudo cp "${https_config}" /etc/nginx/sites-available/rag-console
            sudo nginx -t
            sudo systemctl reload nginx

            sudo mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            printf '%s\n' '#!/bin/sh' 'systemctl reload nginx' | sudo tee /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh >/dev/null
            sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          EC2_ENV_FILE_B64: ${{ secrets.EC2_ENV_FILE_B64 }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL || 'redis://redis:6379/0' }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'rag' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'rag_console' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION || 'us-east-1' }}
          SES_EMAIL_FROM: ${{ secrets.SES_EMAIL_FROM }}
          SES_REGION: ${{ secrets.SES_REGION || secrets.S3_REGION || 'us-east-1' }}
          MAX_UPLOAD_BYTES: ${{ secrets.MAX_UPLOAD_BYTES || '104857600' }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          envs: API_IMAGE,WEB_IMAGE,GHCR_USERNAME,GHCR_TOKEN,EC2_ENV_FILE_B64,DATABASE_URL,REDIS_URL,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,ENCRYPTION_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,S3_BUCKET,S3_REGION,SES_EMAIL_FROM,SES_REGION,MAX_UPLOAD_BYTES
          script: |
            set -eu

            cd "${{ env.EC2_APP_DIR }}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi

            if [ -n "${EC2_ENV_FILE_B64:-}" ]; then
              printf '%s' "${EC2_ENV_FILE_B64}" | base64 -d > .env
            else
              missing=""
              for name in DATABASE_URL REDIS_URL JWT_SECRET ENCRYPTION_KEY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY S3_BUCKET S3_REGION SES_EMAIL_FROM SES_REGION; do
                eval "value=\${$name:-}"
                if [ -z "${value}" ]; then
                  missing="${missing} ${name}"
                fi
              done

              if [ -n "${missing}" ]; then
                echo "Missing required deployment secrets:${missing}"
                exit 1
              fi

              postgres_password="${POSTGRES_PASSWORD:-}"
              if [ -z "${postgres_password}" ]; then
                url_without_scheme="${DATABASE_URL#*://}"
                credentials="${url_without_scheme%%@*}"
                if [ "${credentials}" != "${url_without_scheme}" ] && [ "${credentials#*:}" != "${credentials}" ]; then
                  postgres_password="${credentials#*:}"
                else
                  postgres_password="rag-console-local-postgres"
                fi
              fi

              cat > .env <<EOF
            APP_ENV=production
            APP_DOMAIN=rag.atharvaai.com
            API_BASE_URL=https://rag.atharvaai.com
            WEB_BASE_URL=https://rag.atharvaai.com
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${postgres_password}
            POSTGRES_DB=${POSTGRES_DB}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            JWT_SECRET=${JWT_SECRET}
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            ALLOW_DEV_AUTH_CODES=false
            CORS_ORIGINS=https://rag.atharvaai.com
            S3_ENDPOINT_URL=https://s3.${S3_REGION}.amazonaws.com
            S3_PUBLIC_ENDPOINT_URL=https://s3.${S3_REGION}.amazonaws.com
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION}
            S3_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES}
            EMAIL_BACKEND=ses
            EMAIL_FROM=${SES_EMAIL_FROM}
            AWS_REGION=${SES_REGION}
            EOF
            fi

            chmod 600 .env

            if [ ! -s .env ]; then
              echo "Missing ${{ env.EC2_APP_DIR }}/.env."
              exit 1
            fi

            export API_IMAGE
            export WEB_IMAGE

            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans

            i=0
            until docker compose -f docker-compose.ec2.yml exec -T api curl -fsS http://localhost:8000/healthz >/dev/null; do
              i=$((i + 1))
              if [ "${i}" -ge 30 ]; then
                docker compose -f docker-compose.ec2.yml logs --tail=100 api
                exit 1
              fi
              sleep 5
            done

            curl --resolve rag.atharvaai.com:443:127.0.0.1 -fsS https://rag.atharvaai.com/healthz >/dev/null

            docker image prune -f --filter "until=168h"
