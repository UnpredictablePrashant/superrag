name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

env:
  EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST || '18.188.234.72' }}
  EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER || 'ubuntu' }}
  EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || vars.EC2_APP_DIR || '/opt/rag-console' }}
  EC2_PORT: ${{ secrets.EC2_PORT || vars.EC2_PORT || '22' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://rag.atharvaai.com/api' }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA}"
          echo "api_image=ghcr.io/${owner}/rag-console-api:${tag}" >> "${GITHUB_OUTPUT}"
          echo "web_image=ghcr.io/${owner}/rag-console-web:${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: ${{ steps.images.outputs.api_image }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Validate public API URL
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_API_URL}" ]; then
            echo "Set repository variable NEXT_PUBLIC_API_URL, for example https://rag.atharvaai.com/api"
            exit 1
          fi

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.images.outputs.web_image }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Create app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          script: |
            set -eu
            app_dir="${{ env.EC2_APP_DIR }}"
            case "${app_dir}" in
              "~")
                app_dir="${HOME}"
                ;;
              "~/"*)
                app_dir="${HOME}/${app_dir#~/}"
                ;;
            esac
            echo "Using app directory: ${app_dir}"
            if ! mkdir -p "${app_dir}" 2>/dev/null; then
              sudo mkdir -p "${app_dir}"
              sudo chown "${USER}:${USER}" "${app_dir}"
            fi

      - name: Configure Nginx reverse proxy
        uses: appleboy/ssh-action@v1.0.3
        env:
          TLS_EMAIL: ${{ secrets.TLS_EMAIL || vars.TLS_EMAIL }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          envs: TLS_EMAIL
          script: |
            set -eu

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx certbot python3-certbot-nginx curl
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y nginx certbot python3-certbot-nginx curl
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y nginx certbot python3-certbot-nginx curl
            else
              echo "Unable to find a supported package manager for Nginx installation."
              exit 1
            fi

            sudo mkdir -p /var/www/letsencrypt /etc/nginx/sites-available /etc/nginx/sites-enabled

            if command -v docker >/dev/null 2>&1; then
              old_caddy_ids="$(docker ps --format '{{.ID}} {{.Names}}' | awk '$2 ~ /caddy/ {print $1}')"
              if [ -n "${old_caddy_ids}" ]; then
                docker stop ${old_caddy_ids}
              fi
            fi

            cat > /tmp/rag-console-http.conf <<'NGINX_HTTP'
            server {
                listen 80;
                listen [::]:80;
                server_name rag.atharvaai.com;

                client_max_body_size 100m;

                location /.well-known/acme-challenge/ {
                    root /var/www/letsencrypt;
                    default_type "text/plain";
                }

                location /api/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 300s;
                }

                location /docs {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /redoc {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location = /openapi.json {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location = /healthz {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                }
            }
            NGINX_HTTP

            sudo cp /tmp/rag-console-http.conf /etc/nginx/sites-available/rag-console
            sudo ln -sf /etc/nginx/sites-available/rag-console /etc/nginx/sites-enabled/rag-console
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl enable --now nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx

            request_certificate() {
              attempt=1
              max_attempts=10
              while [ "${attempt}" -le "${max_attempts}" ]; do
                if [ -f /etc/letsencrypt/live/rag.atharvaai.com/fullchain.pem ]; then
                  return 0
                fi

                echo "Requesting Let's Encrypt certificate for rag.atharvaai.com (attempt ${attempt}/${max_attempts})"
                if [ -n "${TLS_EMAIL:-}" ]; then
                  if sudo certbot certonly --webroot --webroot-path /var/www/letsencrypt --domain rag.atharvaai.com --non-interactive --agree-tos --email "${TLS_EMAIL}" --keep-until-expiring; then
                    return 0
                  fi
                else
                  if sudo certbot certonly --webroot --webroot-path /var/www/letsencrypt --domain rag.atharvaai.com --non-interactive --agree-tos --register-unsafely-without-email --keep-until-expiring; then
                    return 0
                  fi
                fi

                if [ -f /etc/letsencrypt/live/rag.atharvaai.com/fullchain.pem ]; then
                  return 0
                fi

                if [ "${attempt}" -eq "${max_attempts}" ]; then
                  echo "Certbot did not complete after ${max_attempts} attempts."
                  return 1
                fi

                echo "Certbot is busy or failed transiently; waiting 30 seconds before retrying."
                sleep 30
                attempt=$((attempt + 1))
              done
            }

            request_certificate

            cat > /tmp/rag-console-https.conf <<'NGINX_HTTPS'
            server {
                listen 80;
                listen [::]:80;
                server_name rag.atharvaai.com;

                location /.well-known/acme-challenge/ {
                    root /var/www/letsencrypt;
                    default_type "text/plain";
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name rag.atharvaai.com;

                ssl_certificate /etc/letsencrypt/live/rag.atharvaai.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/rag.atharvaai.com/privkey.pem;
                ssl_session_cache shared:SSL:10m;
                ssl_session_timeout 1d;
                ssl_session_tickets off;

                client_max_body_size 100m;

                location /api/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 300s;
                }

                location /docs {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /redoc {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location = /openapi.json {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location = /healthz {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                }
            }
            NGINX_HTTPS

            sudo cp /tmp/rag-console-https.conf /etc/nginx/sites-available/rag-console
            sudo nginx -t
            sudo systemctl reload nginx

            sudo mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            printf '%s\n' '#!/bin/sh' 'systemctl reload nginx' | sudo tee /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh >/dev/null
            sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          EC2_ENV_FILE_B64: ${{ secrets.EC2_ENV_FILE_B64 }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL || 'redis://redis:6379/0' }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'rag' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'rag_console' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION || 'us-east-1' }}
          SES_EMAIL_FROM: ${{ secrets.SES_EMAIL_FROM }}
          SES_REGION: ${{ secrets.SES_REGION || secrets.S3_REGION || 'us-east-1' }}
          MAX_UPLOAD_BYTES: ${{ secrets.MAX_UPLOAD_BYTES || '104857600' }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          envs: API_IMAGE,WEB_IMAGE,GHCR_USERNAME,GHCR_TOKEN,EC2_ENV_FILE_B64,DATABASE_URL,REDIS_URL,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,ENCRYPTION_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,S3_BUCKET,S3_REGION,SES_EMAIL_FROM,SES_REGION,MAX_UPLOAD_BYTES
          script: |
            set -eu

            API_IMAGE="${API_IMAGE:-${{ needs.build-and-push.outputs.api_image }}}"
            WEB_IMAGE="${WEB_IMAGE:-${{ needs.build-and-push.outputs.web_image }}}"
            if [ -z "${API_IMAGE}" ] || [ -z "${WEB_IMAGE}" ]; then
              echo "Missing API_IMAGE or WEB_IMAGE from the build-and-push job outputs."
              exit 1
            fi
            export API_IMAGE WEB_IMAGE

            app_dir="${{ env.EC2_APP_DIR }}"
            case "${app_dir}" in
              "~")
                app_dir="${HOME}"
                ;;
              "~/"*)
                app_dir="${HOME}/${app_dir#~/}"
                ;;
            esac

            echo "Using app directory: ${app_dir}"
            cd "${app_dir}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi

            if [ -n "${EC2_ENV_FILE_B64:-}" ]; then
              printf '%s' "${EC2_ENV_FILE_B64}" | base64 -d > .env
            else
              missing=""
              for name in DATABASE_URL REDIS_URL JWT_SECRET ENCRYPTION_KEY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY S3_BUCKET S3_REGION SES_EMAIL_FROM SES_REGION; do
                eval "value=\${$name:-}"
                if [ -z "${value}" ]; then
                  missing="${missing} ${name}"
                fi
              done

              if [ -n "${missing}" ]; then
                echo "Missing required deployment secrets:${missing}"
                exit 1
              fi

              postgres_password="${POSTGRES_PASSWORD:-}"
              if [ -z "${postgres_password}" ]; then
                url_without_scheme="${DATABASE_URL#*://}"
                credentials="${url_without_scheme%%@*}"
                if [ "${credentials}" != "${url_without_scheme}" ] && [ "${credentials#*:}" != "${credentials}" ]; then
                  postgres_password="${credentials#*:}"
                fi
              fi

              if [ -z "${postgres_password}" ]; then
                postgres_password="rag-console-local-postgres"
              fi

              cat > .env <<EOF
            APP_ENV=production
            APP_NAME=RAG Console
            APP_DOMAIN=rag.atharvaai.com
            API_BASE_URL=https://rag.atharvaai.com
            WEB_BASE_URL=https://rag.atharvaai.com
            API_PORT=8000
            WEB_PORT=3000
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${postgres_password}
            POSTGRES_DB=${POSTGRES_DB}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            JWT_SECRET=${JWT_SECRET}
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            SESSION_COOKIE_NAME=rag_console_session
            SESSION_TTL_MINUTES=10080
            OTP_TTL_MINUTES=10
            OTP_RESEND_COOLDOWN_SECONDS=45
            OTP_MAX_ATTEMPTS=5
            ALLOW_DEV_AUTH_CODES=false
            CORS_ORIGINS=https://rag.atharvaai.com
            S3_ENDPOINT_URL=https://s3.${S3_REGION}.amazonaws.com
            S3_PUBLIC_ENDPOINT_URL=https://s3.${S3_REGION}.amazonaws.com
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION}
            S3_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES}
            MULTIPART_THRESHOLD_BYTES=26214400
            EMAIL_BACKEND=ses
            EMAIL_FROM=${SES_EMAIL_FROM}
            AWS_REGION=${SES_REGION}
            DETERMINISTIC_EMBEDDING_DIMENSION=384
            ENABLE_DEV_EMBEDDING_PROVIDER=false
            ENABLE_LLM_CONTENT_PROCESSING=false
            RATE_LIMIT_PER_MINUTE=120
            EOF
            fi

            chmod 600 .env

            if [ ! -s .env ]; then
              echo "Missing ${app_dir}/.env."
              exit 1
            fi

            current_postgres_password="$(grep -E '^POSTGRES_PASSWORD=' .env | tail -n 1 | cut -d= -f2- || true)"
            if [ -z "${current_postgres_password}" ]; then
              database_url_value="$(grep -E '^DATABASE_URL=' .env | tail -n 1 | cut -d= -f2- || true)"
              derived_postgres_password=""
              if [ -n "${database_url_value}" ]; then
                url_without_scheme="${database_url_value#*://}"
                credentials="${url_without_scheme%%@*}"
                if [ "${credentials}" != "${url_without_scheme}" ] && [ "${credentials#*:}" != "${credentials}" ]; then
                  derived_postgres_password="${credentials#*:}"
                fi
              fi
              if [ -z "${derived_postgres_password}" ]; then
                derived_postgres_password="rag-console-local-postgres"
              fi

              if grep -q '^POSTGRES_PASSWORD=' .env; then
                tmp_env="$(mktemp)"
                awk -v value="${derived_postgres_password}" 'BEGIN { done=0 } /^POSTGRES_PASSWORD=/ { print "POSTGRES_PASSWORD=" value; done=1; next } { print } END { if (!done) print "POSTGRES_PASSWORD=" value }' .env > "${tmp_env}"
                mv "${tmp_env}" .env
              else
                printf '\nPOSTGRES_PASSWORD=%s\n' "${derived_postgres_password}" >> .env
              fi
              chmod 600 .env
            fi

            missing_env=""
            for name in DATABASE_URL REDIS_URL POSTGRES_PASSWORD JWT_SECRET ENCRYPTION_KEY S3_BUCKET S3_REGION S3_ACCESS_KEY_ID S3_SECRET_ACCESS_KEY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY EMAIL_FROM AWS_REGION; do
              if ! grep -Eq "^${name}=.+" .env; then
                missing_env="${missing_env} ${name}"
              fi
            done
            if [ -n "${missing_env}" ]; then
              echo "Missing required values in ${app_dir}/.env:${missing_env}"
              exit 1
            fi

            cat > docker-compose.ec2.yml <<'COMPOSE'
            services:
              postgres:
                image: pgvector/pgvector:pg16
                restart: unless-stopped
                environment:
                  POSTGRES_USER: ${POSTGRES_USER:-rag}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag-console-local-postgres}
                  POSTGRES_DB: ${POSTGRES_DB:-rag_console}
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-rag} -d $${POSTGRES_DB:-rag_console}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              redis:
                image: redis:7-alpine
                restart: unless-stopped
                command: redis-server --appendonly yes
                volumes:
                  - redis-data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5

              api:
                image: ${API_IMAGE:?Set API_IMAGE from the deploy workflow}
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
                  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
                ports:
                  - "127.0.0.1:${API_PORT:-8000}:8000"
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 30s

              worker:
                image: ${API_IMAGE:?Set API_IMAGE from the deploy workflow}
                restart: unless-stopped
                command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --include=app.workers.tasks
                env_file:
                  - .env
                environment:
                  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
                  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                  api:
                    condition: service_started

              web:
                image: ${WEB_IMAGE:?Set WEB_IMAGE from the deploy workflow}
                restart: unless-stopped
                environment:
                  NODE_ENV: production
                ports:
                  - "127.0.0.1:${WEB_PORT:-3000}:3000"
                depends_on:
                  api:
                    condition: service_started

            volumes:
              postgres-data:
              redis-data:
            COMPOSE

            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans

            i=0
            until docker compose -f docker-compose.ec2.yml exec -T api curl -fsS http://localhost:8000/healthz >/dev/null; do
              i=$((i + 1))
              if [ "${i}" -ge 30 ]; then
                docker compose -f docker-compose.ec2.yml logs --tail=100 api
                exit 1
              fi
              sleep 5
            done

            curl --resolve rag.atharvaai.com:443:127.0.0.1 -fsS https://rag.atharvaai.com/healthz >/dev/null

            docker image prune -f --filter "until=168h"
